name: CryptoPulse Daily

on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-crypto-${{ hashFiles('requirements.txt') }}

      - run: pip install -r requirements.txt

      - run: python report.py
      - run: python scripts/dominance.py
      - run: python scripts/movers.py
      - run: python scripts/fear_greed.py

      - name: Configure git
        run: |
          git config user.name "jayj221"
          git config user.email "jayj221@users.noreply.github.com"

      - name: Commit crypto report
        run: |
          git add reports/$(date +%Y-%m-%d).md
          git diff --staged --quiet || git commit -m "📈 Crypto report $(date -u '+%Y-%m-%d') — BTC ETH SOL"

      - name: Commit dominance
        run: |
          git add data/market_dominance.json
          git diff --staged --quiet || git commit -m "₿ BTC dominance $(date -u '+%Y-%m-%d') — market cap tracked"

      - name: Commit movers
        run: |
          git add data/movers.json
          git diff --staged --quiet || git commit -m "🚀 Top movers $(date -u '+%Y-%m-%d') — gainers and losers"

      - name: Commit fear & greed
        run: |
          git add data/fear_greed.json
          git diff --staged --quiet || git commit -m "😨 Fear & greed $(date -u '+%Y-%m-%d') — sentiment index"

      - run: git push
